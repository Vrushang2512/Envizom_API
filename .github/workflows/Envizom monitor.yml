name: Envizom API Monitor

on:
  schedule:
    # Runs once every hour, 24/7, on the hour. GitHub uses UTC time for cron schedules.
    - cron: "0 * * * *"
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  check-envizom:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Envizom monitor
        env:
          ENVIZOM_USERNAME: ${{ secrets.ENVIZOM_USERNAME }}
          ENVIZOM_PASSWORD: ${{ secrets.ENVIZOM_PASSWORD }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python envizom_monitor.py
