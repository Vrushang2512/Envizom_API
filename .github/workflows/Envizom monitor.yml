name: Envizom API Monitor

on:
  schedule:
    # GitHub Actions cron always runs in UTC - there's no native IST setting.
    # IST = UTC + 5:30, so triggering at :30 UTC lands exactly on the hour in IST
    # (e.g. 00:30 UTC = 06:00 IST, 01:30 UTC = 07:00 IST, etc.)
    - cron: "30 * * * *"
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  check-envizom:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Envizom monitor
        env:
          ENVIZOM_USERNAME: ${{ secrets.ENVIZOM_USERNAME }}
          ENVIZOM_PASSWORD: ${{ secrets.ENVIZOM_PASSWORD }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python envizom_monitor.py
